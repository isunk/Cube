<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cube</title>
    <link rel="stylesheet" href="/libs/element-plus/2.10.5/index.min.css" />
    <style>
        html, body {
            margin: 0;
            background-color: #f0f2f5;
        }
        [v-cloak] {
            display: none;
        }
        .el-menu-item:hover {
            background-color: transparent !important;
        }
    </style>
</head>

<body v-cloak>
    <el-menu mode="horizontal" :ellipsis="false" :default-active="menu" style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: transparent; background-image: radial-gradient(transparent 1px, #fff 1px); background-size: 4px 4px; backdrop-filter: saturate(50%) blur(4px);">
        <el-menu-item index="brand" disabled style="cursor: default; pointer-events: none; opacity: 1 !important;">
            <span style="font-weight: 300; font-size: 1.6rem; text-shadow: 1px 1px 1px #79bbff; color: var(--el-color-primary);">Cube</span>
        </el-menu-item>
        <div style="flex: 1;"></div>
        <el-menu-item index="source" @click="$router.push('/')">Source</el-menu-item>
        <el-menu-item index="database" @click="$router.push('/database')">Database</el-menu-item>
        <el-menu-item index="file" @click="$router.push('/file')">File</el-menu-item>
        <el-menu-item index="document" @click="$router.push('/document')">Document</el-menu-item>
    </el-menu>
    <el-card style="margin: 92px 24px 32px 24px;">
        <router-view />
    </el-card>

    <script src="/libs/vue@3.5.18/vue.global.prod.min.js"></script>
    <script src="/libs/vue-router@4.5.1/vue-router.global.prod.min.js"></script>
    <script src="/libs/vue3-sfc-loader@0.9.5/vue3-sfc-loader.min.js"></script>
    <script src="/libs/element-plus/2.10.5/index.full.min.js"></script>
    <script src="/libs/element-plus-icons-vue/2.3.1/index.iife.min.js"></script>
    <script>
        const $import = (() => {
            const sfetch = src => {
                const map = globalThis.jsloaders || (globalThis.jsloaders = new Map())
                if (!map.has(src)) {
                    map.set(src, new Promise((resolve, reject) => {
                        const e = document.createElement("script")
                        e.src = src
                        e.addEventListener("load", () => resolve())
                        e.onerror = () => document.body.removeChild(e) && map.delete(src) && reject()
                        document.body.append(e)
                    }))
                }
                return map.get(src)
            }
            const modules = {
                marked: () => sfetch("/libs/marked/9.0.0/marked.min.js"),
                mermaid: () => sfetch("/libs/mermaid/11.12.0/mermaid.min.js"),
                monaco: () => sfetch("/libs/monaco-editor/0.52.2/min/vs/loader.js").then(() => window.require.config({ paths: { vs: "/libs/monaco-editor/0.52.2/min/vs" } })).then(() => new Promise((resolve) => window.require(["vs/editor/editor.main"], resolve))),
                ts: () => sfetch("/libs/typescript/5.9.2/typescript.min.js"),
            }
            const options = {
                moduleCache: {
                    vue: Vue,
                    router: VueRouter,
                },
                async getFile(url) {
                    const res = await fetch(url)
                    if (!res.ok) {
                        throw Object.assign(new Error(`${res.statusText} ${url}`), { res })
                    }
                    return {
                        getContentData: (asBinary) => asBinary ? res.arrayBuffer() : res.text(),
                    }
                },
                addStyle(textContent) {
                    const style = Object.assign(document.createElement("style"), { textContent }),
                        ref = document.head.getElementsByTagName("style")[0] || null
                    document.head.insertBefore(style, ref)
                },
                log: (...args) => console.log(...args),
            }
            return (name) => {
                if (!!~name.indexOf(".vue")) {
                    return Vue.defineAsyncComponent(() => window["vue3-sfc-loader"].loadModule(name, options))
                }
                if (modules[name]) {
                    return new Promise(resolve => window[name] ? resolve(window[name]) : modules[name]().then(() => resolve(window[name])))
                }
                throw new Error(`unknown import: ${name}`)
            }
        })()

        const app = Vue.createApp({
            computed: {
                menu() {
                    return this.$route.path.substring(1) || "source"
                },
            },
        })
        app.use(VueRouter.createRouter({
            history: VueRouter.createWebHashHistory(),
            routes: [
                { path: "/", component: $import("/views/Source.vue") },
                { path: "/database", component: $import("/views/Database.vue") },
                { path: "/file", component: $import("/views/File.vue") },
                { path: "/document", component: $import("/views/Document.vue") },
            ],
        }))
        app.use(ElementPlus)
        app.mount(document.body)
    </script>
</body>

</html>
