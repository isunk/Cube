<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cube</title>
    <link rel="stylesheet" href="/libs/element-plus/2.10.5/index.min.css" />
    <style>
        html, body {
            margin: 0;
            background-color: #f0f2f5;
        }
        [v-cloak] {
            display: none;
        }
        .el-menu-item:hover {
            background-color: transparent !important;
        }
    </style>
</head>

<body v-cloak>
    <el-menu mode="horizontal" :ellipsis="false" :default-active="menu"
        style="position:fixed;top:0;left:0;right:0;z-index:100;background:transparent;background-image:radial-gradient(transparent 1px,#fff 1px);background-size:4px 4px;backdrop-filter:saturate(50%) blur(4px)">
        <el-menu-item index="brand" disabled
            style="cursor:default;pointer-events:none;opacity:1!important">
            <span style="font-weight:300;font-size:1.6rem;text-shadow:1px 1px 1px #79bbff;color:var(--el-color-primary)">Cube</span>
        </el-menu-item>
        <div style="flex:1"></div>
        <el-menu-item index="source" @click="$router.push('/')">Source</el-menu-item>
        <el-menu-item index="database" @click="$router.push('/database')">Database</el-menu-item>
        <el-menu-item index="file" @click="$router.push('/file')">File</el-menu-item>
        <el-menu-item index="document" @click="$router.push('/document')">Document</el-menu-item>
    </el-menu>
    <el-card style="margin: 92px 24px 32px 24px;">
        <router-view />
    </el-card>

    <script src="/libs/vue@3.5.18/vue.global.prod.min.js"></script>
    <script src="/libs/vue-router@4.5.1/vue-router.global.prod.min.js"></script>
    <script src="/libs/vue3-sfc-loader@0.9.5/vue3-sfc-loader.min.js"></script>
    <script src="/libs/element-plus/2.10.5/index.full.min.js"></script>
    <script src="/libs/element-plus-icons-vue/2.3.1/index.iife.min.js"></script>

    <script>
        const load = (() => {
            const options = {
                moduleCache: {
                    vue: Vue,
                    router: VueRouter,
                    marked: () => new Promise(resolve => {
                        if (window.marked) return resolve({ default: marked })
                        const s = document.createElement("script")
                        s.src = "/libs/marked/9.0.0/marked.min.js"
                        s.onload = () => resolve({ default: marked })
                        document.head.appendChild(s)
                    }),
                    mermaid: () => new Promise(resolve => {
                        if (window.mermaid) return resolve({ default: mermaid })
                        const s = document.createElement("script")
                        s.src = "/libs/mermaid/11.12.0/mermaid.min.js"
                        s.onload = () => resolve({ default: mermaid })
                        document.head.appendChild(s)
                    }),
                },
                async getFile(url) {
                    const res = await fetch(url)
                    if (!res.ok) {
                        throw Object.assign(new Error(res.statusText + " " + url), { res })
                    }
                    return {
                        getContentData: (asBinary) => asBinary ? res.arrayBuffer() : res.text(),
                    }
                },
                addStyle(textContent) {
                    const style = Object.assign(document.createElement("style"), { textContent }),
                        ref = document.head.getElementsByTagName("style")[0] || null
                    document.head.insertBefore(style, ref)
                },
                log: (...args) => console.log(...args),
            }
            return (name) => Vue.defineAsyncComponent(() => window["vue3-sfc-loader"].loadModule(name, options))
        })()

        const routes = [
            { path: "/", component: load("/views/Source.vue") },
            { path: "/database", component: load("/views/Database.vue") },
            { path: "/file", component: load("/views/File.vue") },
            { path: "/document", component: load("/views/Document.vue") },
        ]

        const app = Vue.createApp({
            computed: {
                menu() {
                    return this.$route.path === "/" ? "source" : this.$route.path.substring(1)
                },
            },
        })
        app.use(VueRouter.createRouter({
            history: VueRouter.createWebHashHistory(),
            routes,
        }))
        app.use(ElementPlus)
        app.mount("body")
    </script>
</body>

</html>
